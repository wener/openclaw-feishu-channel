<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <!-- 背景 -->
  <rect width="900" height="500" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333" font-family="Arial, sans-serif">
    OpenClaw 多 Agent 多 Bot 协作架构
  </text>
  
  <!-- OpenClaw -->
  <rect x="30" y="200" width="100" height="60" rx="8" fill="#1976d2" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="235" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="Arial, sans-serif">OpenClaw</text>
  
  <!-- Agents -->
  <rect x="170" y="80" width="80" height="40" rx="5" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
  <text x="210" y="105" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Agent 1</text>
  
  <rect x="170" y="160" width="80" height="40" rx="5" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
  <text x="210" y="185" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Agent 2</text>
  
  <rect x="170" y="240" width="80" height="40" rx="5" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
  <text x="210" y="265" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Agent 3</text>
  
  <rect x="170" y="320" width="80" height="40" rx="5" fill="#42a5f5" stroke="#1976d2" stroke-width="1.5"/>
  <text x="210" y="345" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Agent 4</text>
  
  <!-- Bots -->
  <rect x="300" y="80" width="80" height="40" rx="5" fill="#66bb6a" stroke="#388e3c" stroke-width="1.5"/>
  <text x="340" y="105" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Bot 1</text>
  
  <rect x="300" y="160" width="80" height="40" rx="5" fill="#66bb6a" stroke="#388e3c" stroke-width="1.5"/>
  <text x="340" y="185" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Bot 2</text>
  
  <rect x="300" y="240" width="80" height="40" rx="5" fill="#66bb6a" stroke="#388e3c" stroke-width="1.5"/>
  <text x="340" y="265" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Bot 3</text>
  
  <rect x="300" y="320" width="80" height="40" rx="5" fill="#66bb6a" stroke="#388e3c" stroke-width="1.5"/>
  <text x="340" y="345" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial, sans-serif">Bot 4</text>
  
  <!-- 群聊圆圈 -->
  <circle cx="650" cy="230" r="120" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="650" y="140" text-anchor="middle" font-size="14" fill="#2e7d32" font-weight="bold" font-family="Arial, sans-serif">飞书群聊</text>
  
  <!-- 群内机器人 -->
  <!-- Leader -->
  <rect x="580" y="160" width="70" height="35" rx="5" fill="#ff7043" stroke="#e64a19" stroke-width="1.5"/>
  <text x="615" y="182" text-anchor="middle" font-size="11" fill="white" font-weight="bold" font-family="Arial, sans-serif">Leader</text>
  
  <!-- 开发 -->
  <rect x="530" y="230" width="70" height="35" rx="5" fill="#ab47bc" stroke="#8e24aa" stroke-width="1.5"/>
  <text x="565" y="252" text-anchor="middle" font-size="11" fill="white" font-weight="bold" font-family="Arial, sans-serif">开发</text>
  
  <!-- Android -->
  <rect x="615" y="230" width="70" height="35" rx="5" fill="#5c6bc0" stroke="#3949ab" stroke-width="1.5"/>
  <text x="650" y="252" text-anchor="middle" font-size="11" fill="white" font-weight="bold" font-family="Arial, sans-serif">Android</text>
  
  <!-- 测试 -->
  <rect x="710" y="230" width="70" height="35" rx="5" fill="#26a69a" stroke="#00897b" stroke-width="1.5"/>
  <text x="745" y="252" text-anchor="middle" font-size="11" fill="white" font-weight="bold" font-family="Arial, sans-serif">测试</text>
  
  <!-- 用户 -->
  <circle cx="615" y="70" r="25" fill="#ffca28" stroke="#ffb300" stroke-width="2"/>
  <text x="615" y="75" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Arial, sans-serif">你</text>
  
  <!-- 连接线：OpenClaw -> Agents -->
  <line x1="130" y1="210" x2="170" y2="100" stroke="#1976d2" stroke-width="2"/>
  <line x1="130" y1="220" x2="170" y2="180" stroke="#1976d2" stroke-width="2"/>
  <line x1="130" y1="240" x2="170" y2="260" stroke="#1976d2" stroke-width="2"/>
  <line x1="130" y1="250" x2="170" y2="340" stroke="#1976d2" stroke-width="2"/>
  
  <!-- 连接线：Agents -> Bots -->
  <line x1="250" y1="100" x2="300" y2="100" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="180" x2="300" y2="180" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="260" x2="300" y2="260" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="340" x2="300" y2="340" stroke="#666" stroke-width="1.5"/>
  
  <!-- 连接线：Bots -> 群 -->
  <line x1="380" y1="100" x2="570" y2="170" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="380" y1="180" x2="550" y2="230" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="380" y1="260" x2="640" y2="240" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="380" y1="340" x2="720" y2="250" stroke="#4caf50" stroke-width="1.5"/>
  
  <!-- 群内机器人相互 @ -->
  <path d="M 615 195 Q 565 210 565 230" stroke="#ff5722" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 615 195 Q 650 210 650 230" stroke="#ff5722" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 615 195 Q 715 210 745 230" stroke="#ff5722" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <path d="M 565 265 Q 600 285 615 295" stroke="#ff5722" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 650 265 Q 700 285 745 250" stroke="#ff5722" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 565 265 Q 650 300 745 250" stroke="#ff5722" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- 用户 <-> Leader -->
  <line x1="615" y1="95" x2="615" y2="160" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="625" y1="160" x2="625" y2="95" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff5722"/>
    </marker>
  </defs>
  
  <!-- 说明 -->
  <rect x="30" y="420" width="840" height="60" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" font-size="12" fill="#666" font-family="Arial, sans-serif">
    OpenClaw 生长出多个 Agent，每个 Agent 关联一个 Bot，所有 Bot 汇聚到飞书群聊，群内机器人相互 @ 协作
  </text>
  <text x="450" y="465" text-anchor="middle" font-size="11" fill="#999" font-family="Arial, sans-serif">
    蓝色：OpenClaw/Agent 层 | 绿色：Bot/群聊层 | 橙色：用户交互 | 红色箭头：机器人相互 @
  </text>
</svg>